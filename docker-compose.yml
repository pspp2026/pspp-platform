version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pspp-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: pspp
      MYSQL_USER: pspp_user
      MYSQL_PASSWORD: secret
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: